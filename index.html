            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #667eea;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: 600;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        button.active {
            background: #ffd700;
            color: #333;
        }
        
        .card-container {
            perspective: 1000px;
            width: 90%;
            max-width: 500px;
            height: 300px;
            margin-bottom: 30px;
        }
        
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            background: white;
        }
        
        .card-front {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .card-back {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            transform: rotateY(180deg);
            color: white;
        }
        
        .word {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .phonetic {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
        }
        
        .meaning {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .pos {
            font-size: 1.1em;
            opacity: 0.9;
            background: rgba(255,255,255,0.3);
            padding: 5px 15px;
            border-radius: 15px;
        }
        
        .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.9em;
            color: #999;
        }
        
        .navigation {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            padding: 0;
        }
        
        .progress-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            transition: width 0.3s;
        }
        
        .list-view {
            display: none;
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);

        .list-view.active {
            display: block;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        
        .list-item:hover {
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .list-word {
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }
        
        .list-meaning {
            color: #666;
        }
        
        .hide-btn {
            margin-top: 20px;
            background: #ff6b6b;
            color: white;
        }
        
        @media print {
            body {
                background: white;
            }
            .controls, .navigation, .header {
                display: none;
            }
            .card-container {
                page-break-after: always;
                height: 250px;
                margin: 20px auto;
            }
            .card {

            }
            .card-back {
                display: none;

        let mastered = new Set();
        let isFlipped = false;

        function init() {
            document.getElementById('total').textContent = vocabulary.length;
            updateCard();
            updateProgress();
            generateList();
            
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    flipCard();
                } else if (e.key === 'ArrowLeft') {
                    prevCard();
                } else if (e.key === 'ArrowRight') {
                    nextCard();
                } else if (e.key === 'm' || e.key === 'M') {
                    markMastered();
                }
            });
        }

        function updateCard() {
            const card = vocabulary[currentIndex];
            document.getElementById('cardWord').textContent = card.word;
            document.getElementById('cardPhonetic').textContent = card.phonetic;
            document.getElementById('cardMeaning').textContent = card.meaning;
            document.getElementById('cardPos').textContent = card.pos;
            document.getElementById('current').textContent = currentIndex + 1;
            
            // 重置翻转状态
            isFlipped = false;
            document.getElementById('card').classList.remove('flipped');
            
            // 标记已掌握
            if (mastered.has(currentIndex)) {
                document.querySelector('.card-front').style.background = 'linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%)';
            } else {
                document.querySelector('.card-front').style.background = 'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)';
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < vocabulary.length - 1) {
                currentIndex++;
                updateCard();
                updateProgress();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
                updateProgress();
            }
        }

        function markMastered() {
            if (mastered.has(currentIndex)) {
                mastered.delete(currentIndex);
            } else {
                mastered.add(currentIndex);
            }
            document.getElementById('mastered').textContent = mastered.size;
            updateCard();
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / vocabulary.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function shuffleCards() {
            for (let i = vocabulary.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [vocabulary[i], vocabulary[j]] = [vocabulary[j], vocabulary[i]];
            }
            currentIndex = 0;
            mastered.clear();
            document.getElementById('mastered').textContent = '0';
            updateCard();
            updateProgress();
            generateList();
        }

        function toggleList() {
            const listView = document.getElementById('listView');
            const cardContainer = document.getElementById('cardContainer');
            const navigation = document.getElementById('navigation');
            
            if (listView.classList.contains('active')) {
                listView.classList.remove('active');
                cardContainer.style.display = 'block';
                navigation.style.display = 'flex';
            } else {
                listView.classList.add('active');
                cardContainer.style.display = 'none';
                navigation.style.display = 'none';
            }
        }

        function generateList() {
            const content = document.getElementById('listContent');
            content.innerHTML = '';
            
            vocabulary.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div>
                        <div class="list-word">${item.word} <span style="color:#999;font-size:0.8em;">${item.phonetic}</span></div>
                        <div style="color:#999;font-size:0.9em;">${item.pos}</div>
                    </div>
                    <div class="list-meaning">${item.meaning}</div>
                `;
                div.onclick = () => {
                    currentIndex = index;
                    toggleList();
                    updateCard();
                    updateProgress();
                };
                content.appendChild(div);
            });
        }

        function resetProgress() {
            currentIndex = 0;
            mastered.clear();
            document.getElementById('mastered').textContent = '0';
            updateCard();
            updateProgress();
        }

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('cardContainer').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.getElementById('cardContainer').addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) nextCard();
            if (touchEndX > touchStartX + 50) prevCard();
        }

        init();
    </script>
</body>
</html>
