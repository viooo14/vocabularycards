<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考词汇记忆卡 - 2026广东一模</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 分类选择页面 */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .category-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .category-card.active {
            border: 3px solid #667eea;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .category-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .category-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .category-stats {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-number {
            font-weight: bold;
            color: #667eea;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 单词卡片页面 */
        .study-section {
            display: none;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 6px;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: white;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .timer-bar {
            background: rgba(255,255,255,0.3);
            height: 4px;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-fill {
            background: #ff6b6b;
            height: 100%;
            width: 100%;
            transition: width linear;
        }

        .card-container {
            perspective: 1000px;
            height: 400px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            overflow-y: auto;
        }

        .word-main {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .word-phonetic {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        .word-source {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .word-pos {
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .word-definition {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .word-details {
            text-align: left;
            width: 100%;
            margin-top: 20px;
        }

        .detail-section {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .detail-label {
            font-size: 12px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        .hint-text {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .action-buttons.visible {
            opacity: 1;
            pointer-events: all;
        }

        .btn-action {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-remember {
            background: #51cf66;
            color: white;
            box-shadow: 0 4px 15px rgba(81, 207, 102, 0.4);
        }

        .btn-remember:hover {
            background: #40c057;
            transform: translateY(-2px);
        }

        .btn-forget {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-forget:hover {
            background: #fa5252;
            transform: translateY(-2px);
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: white;
            color: #667eea;
        }

        /* 统计页面 */
        .stats-section {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .stats-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
        }

        .word-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .word-item:hover {
            background: #f8f9fa;
        }

        .word-info {
            flex: 1;
        }

        .word-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .word-meta {
            font-size: 12px;
            color: #999;
        }

        .word-status {
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-mastered {
            background: #d3f9d8;
            color: #2b8a3e;
        }

        .status-fuzzy {
            background: #ffe3e3;
            color: #c92a2a;
        }

        .status-pending {
            background: #e7f5ff;
            color: #1971c2;
        }

        .export-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        /* 词汇表预览 */
        .preview-section {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: white;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
        }

        .preview-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 14px;
            position: sticky;
            top: 60px;
        }

        .preview-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .preview-table tr:hover {
            background: #f8f9fa;
        }

        .star-mark {
            color: #ffd43b;
            font-weight: bold;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .categories-grid {
                grid-template-columns: 1fr;
            }
            
            .word-main {
                font-size: 28px;
            }
            
            .action-buttons {
                flex-direction: column;
                width: 100%;
            }
            
            .btn-action {
                width: 100%;
            }
        }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 高考词汇记忆卡</h1>
            <div class="subtitle">2026年广东高三一模英语词汇</div>
        </header>

        <!-- 分类选择页面 -->
        <div id="categorySection" class="fade-in">
            <div class="categories-grid" id="categoriesGrid">
                <!-- 动态生成分类卡片 -->
            </div>
            <button class="btn-primary" id="startStudyBtn" onclick="startStudy()" disabled>
                开始检测 (请先选择分类)
            </button>
            <button class="btn-primary" onclick="showStats()" style="background: rgba(255,255,255,0.2); margin-top: 10px;">
                📊 查看学习统计
            </button>
        </div>

        <!-- 学习页面 -->
        <div id="studySection" class="study-section">
            <button class="btn-back" onclick="backToCategories()">← 返回分类</button>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="timer-bar" id="timerBar" style="display: none;">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="card-container" id="cardContainer" onclick="flipCard()">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <div class="word-source" id="cardSource">阅读A</div>
                        <div class="word-main" id="cardWord">knowledgeable</div>
                        <div class="word-phonetic" id="cardPhonetic">/ˈnɒlɪdʒəbl/</div>
                        <div class="hint-text">点击翻面 或 等待5秒自动翻面</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="word-main" id="cardWordBack">knowledgeable</div>
                        <div class="word-pos" id="cardPos">adj.</div>
                        <div class="word-definition" id="cardDef">知识渊博的，有见识的</div>
                        
                        <div class="word-details">
                            <div class="detail-section">
                                <div class="detail-label">高考常考变形</div>
                                <div class="detail-content" id="cardForms">knowledge (n. 知识)</div>
                            </div>
                            <div class="detail-section">
                                <div class="detail-label">高考常考同近义词</div>
                                <div class="detail-content" id="cardSynonyms">well-informed, expert</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-buttons" id="actionButtons">
                <button class="btn-action btn-remember" onclick="handleResponse('remember')">
                    ✓ 记得
                </button>
                <button class="btn-action btn-forget" onclick="handleResponse('forget')">
                    ✗ 模糊
                </button>
            </div>
        </div>

        <!-- 词汇表预览 -->
        <div id="previewSection" class="preview-section">
            <div class="preview-header">
                <h2 id="previewTitle">阅读A篇词汇表</h2>
                <button class="btn-back" onclick="closePreview()">关闭预览</button>
            </div>
            <table class="preview-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>词汇</th>
                        <th>词性</th>
                        <th>词义</th>
                        <th>变形/同义词</th>
                    </tr>
                </thead>
                <tbody id="previewTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
            <button class="btn-primary" onclick="startStudyFromPreview()" style="margin-top: 20px;">
                开始检测此分类
            </button>
        </div>

        <!-- 统计页面 -->
        <div id="statsSection" class="stats-section">
            <div class="stats-header">
                <h2>📊 学习统计</h2>
                <p style="color: #666; margin-top: 10px;">数据保存在本地浏览器中</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="totalWords">0</div>
                    <div class="stat-label">总词汇量</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="masteredWords">0</div>
                    <div class="stat-label">已掌握</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="fuzzyWords">0</div>
                    <div class="stat-label">需复习</div>
                </div>
            </div>

            <h3 style="margin-bottom: 15px; color: #333;">词汇掌握详情</h3>
            <div class="word-list" id="statsWordList">
                <!-- 动态生成 -->
            </div>

            <button class="export-btn" onclick="exportData()">📥 导出学习数据 (JSON)</button>
            <button class="btn-back" onclick="backToCategoriesFromStats()" style="margin-top: 10px; width: 100%;">
                返回首页
            </button>
        </div>
    </div>

                    {id: 198, word: 'overwhelming', pos: 'adj.', def: '压倒性的', forms: 'overwhelm (v. 压倒), overwhelmingly (adv. 压倒性地)', synonyms: 'overpowering', star: false},

                    {id: 200, word: 'reluctantly', pos: 'adv.', def: '不情愿地', forms: 'reluctant (adj. 不情愿的), reluctance (n. 不情愿)', synonyms: 'unwillingly, grudgingly', star: false},

                    {id: 203, word: 'satisfaction', pos: 'n.', def: '满足', forms: 'satisfy (v. 使满意), satisfied (adj. 满意的), satisfactory (adj. 令人满意的)', synonyms: 'contentment, fulfillment', star: false},
                    {id: 204, word: 'perseverance', pos: 'n.', def: '毅力', forms: 'persevere (v. 坚持), persevering (adj. 坚忍的)', synonyms: 'persistence, endurance', star: false},
                    {id: 205, word: 'precious', pos: 'adj.', def: '珍贵的', forms: 'preciously (adv. 珍贵地), preciousness (n. 珍贵)', synonyms: 'valuable, dear', star: false}
                ]
            }
        };

        // 状态管理
        let currentCategory = null;
        let studyQueue = [];
        let currentWordIndex = 0;
        let timerInterval = null;
        let isFlipped = false;
        let wordStats = {};
        let selectedCategories = new Set();

        // 初始化
        function init() {
            loadStats();
            renderCategories();
        }

        // 从localStorage加载统计
        function loadStats() {
            const saved = localStorage.getItem('vocabularyStats');
            if (saved) {
                wordStats = JSON.parse(saved);
            }
        }

        // 保存统计到localStorage
        function saveStats() {
            localStorage.setItem('vocabularyStats', JSON.stringify(wordStats));
        }

        // 渲染分类卡片
        function renderCategories() {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = '';
            
            Object.keys(vocabularyData).forEach(key => {
                const category = vocabularyData[key];
                const stats = getCategoryStats(key);
                
                const card = document.createElement('div');
                card.className = 'category-card';
                card.onclick = () => toggleCategory(key);
                card.ondblclick = () => showPreview(key);
                
                card.innerHTML = `
                    <div class="category-header">
                        <div class="category-name">${category.name}</div>
                        <div class="category-count">${category.words.length}词</div>
                    </div>
                    <div class="category-stats">
                        <div class="stat-item">
                            <span>已掌握:</span>
                            <span class="stat-number">${stats.mastered}</span>
                        </div>
                        <div class="stat-item">
                            <span>待复习:</span>
                            <span class="stat-number">${stats.fuzzy}</span>
                        </div>
                        <div class="stat-item">
                            <span>未学习:</span>
                            <span class="stat-number">${stats.pending}</span>
                        </div>
                    </div>
                    <div style="margin-top: 10px; font-size: 12px; color: #999; text-align: center;">
                        双击查看词汇表
                    </div>
                `;
                
                card.id = `cat-${key}`;
                grid.appendChild(card);
            });
        }

        // 获取分类统计
        function getCategoryStats(categoryKey) {
            const words = vocabularyData[categoryKey].words;
            let mastered = 0, fuzzy = 0, pending = 0;
            
            words.forEach(word => {
                const stat = wordStats[word.id];
                if (!stat) {
                    pending++;
                } else if (stat.status === 'mastered') {
                    mastered++;
                } else if (stat.status === 'fuzzy') {
                    fuzzy++;
                } else {
                    pending++;
                }
            });
            
            return { mastered, fuzzy, pending };
        }

        // 切换分类选择
        function toggleCategory(key) {
            const card = document.getElementById(`cat-${key}`);
            
            if (selectedCategories.has(key)) {
                selectedCategories.delete(key);
                card.classList.remove('active');
            } else {
                selectedCategories.add(key);
                card.classList.add('active');
            }
            
            updateStartButton();
        }

        // 更新开始按钮
        function updateStartButton() {
            const btn = document.getElementById('startStudyBtn');
            if (selectedCategories.size > 0) {
                const totalWords = Array.from(selectedCategories).reduce((sum, key) => {
                    return sum + vocabularyData[key].words.length;
                }, 0);
                btn.textContent = `开始检测 (${totalWords}个单词)`;
                btn.disabled = false;
            } else {
                btn.textContent = '开始检测 (请先选择分类)';
                btn.disabled = true;
            }
        }

        // 显示词汇表预览
        function showPreview(key) {
            currentCategory = key;
            const category = vocabularyData[key];
            document.getElementById('previewTitle').textContent = category.name + ' - 词汇表';
            
            const tbody = document.getElementById('previewTableBody');
            tbody.innerHTML = '';
            
            category.words.forEach(word => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${word.id}</td>
                    <td>${word.star ? '<span class="star-mark">★</span> ' : ''}${word.word}</td>
                    <td>${word.pos}</td>
                    <td>${word.def}</td>
                    <td>${word.forms !== '-' ? word.forms : ''}${word.synonyms !== '-' ? '<br>同: ' + word.synonyms : ''}</td>
                `;
                tbody.appendChild(row);
            });
            
            document.getElementById('categorySection').style.display = 'none';
            document.getElementById('previewSection').style.display = 'block';
        }

        // 关闭预览
        function closePreview() {
            document.getElementById('previewSection').style.display = 'none';
            document.getElementById('categorySection').style.display = 'block';
            currentCategory = null;
        }

        // 从预览开始检测
        function startStudyFromPreview() {
            selectedCategories = new Set([currentCategory]);
            closePreview();
            startStudy();
        }

        // 开始学习
        function startStudy() {
            if (selectedCategories.size === 0) return;
            
            // 构建学习队列（排除已标记为模糊的单词）
            studyQueue = [];
            selectedCategories.forEach(key => {
                vocabularyData[key].words.forEach(word => {
                    const stat = wordStats[word.id];
                    // 如果之前标记为模糊，暂时跳过（后续可实现复习模式）
                    if (!stat || stat.status !== 'fuzzy') {
                        studyQueue.push({...word, category: key});
                    }
                });
            });
            
            // 随机打乱
            studyQueue = shuffleArray(studyQueue);
            
            if (studyQueue.length === 0) {
                alert('该分类下所有单词都已标记为模糊，请前往统计页面查看或重置进度！');
                return;
            }
            
            currentWordIndex = 0;
            document.getElementById('categorySection').style.display = 'none';
            document.getElementById('studySection').style.display = 'block';
            document.getElementById('statsSection').style.display = 'none';
            
            showWord();
        }

        // 显示单词
        function showWord() {
            if (currentWordIndex >= studyQueue.length) {
                finishStudy();
                return;
            }
            
            const word = studyQueue[currentWordIndex];
            isFlipped = false;
            
            // 正面
            document.getElementById('cardSource').textContent = vocabularyData[word.category].name.split('（')[0];
            document.getElementById('cardWord').textContent = word.word;
            document.getElementById('cardWordBack').textContent = word.word;
            
            // 背面
            document.getElementById('cardPos').textContent = word.pos;
            document.getElementById('cardDef').textContent = word.def;
            document.getElementById('cardForms').textContent = word.forms;
            document.getElementById('cardSynonyms').textContent = word.synonyms;
            
            // 重置卡片状态
            document.getElementById('flashcard').classList.remove('flipped');
            document.getElementById('actionButtons').classList.remove('visible');
            
            // 更新进度条
            const progress = ((currentWordIndex) / studyQueue.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // 启动5秒计时器
            startTimer();
        }

        // 启动计时器
        function startTimer() {
            clearInterval(timerInterval);
            const timerBar = document.getElementById('timerBar');
            const timerFill = document.getElementById('timerFill');
            
            timerBar.style.display = 'block';
            timerFill.style.transition = 'none';
            timerFill.style.width = '100%';
            
            setTimeout(() => {
                timerFill.style.transition = 'width 5s linear';
                timerFill.style.width = '0%';
            }, 50);
            
            timerInterval = setTimeout(() => {
                if (!isFlipped) {
                    flipCard();
                    // 自动标记为模糊
                    setTimeout(() => {
                        handleResponse('forget');
                    }, 500);
                }
            }, 5000);
        }

        // 翻面
        function flipCard() {
            if (isFlipped) return;
            
            clearInterval(timerInterval);
            isFlipped = true;
            document.getElementById('flashcard').classList.add('flipped');
            document.getElementById('actionButtons').classList.add('visible');
            document.getElementById('timerBar').style.display = 'none';
        }

        // 处理回答
        function handleResponse(response) {
            const word = studyQueue[currentWordIndex];
            
            // 更新统计
            if (!wordStats[word.id]) {
                wordStats[word.id] = { attempts: 0, correct: 0, status: 'pending' };
            }
            
            wordStats[word.id].attempts++;
            
            if (response === 'remember') {
                wordStats[word.id].correct++;
                // 连续两次记得则标记为掌握
                if (wordStats[word.id].correct >= 2) {
                    wordStats[word.id].status = 'mastered';
                }
            } else {
                wordStats[word.id].status = 'fuzzy';
                wordStats[word.id].lastFuzzy = new Date().toISOString();
            }
            
            saveStats();
            
            // 动画效果
            const card = document.getElementById('cardContainer');
            card.classList.add('fade-in');
            setTimeout(() => card.classList.remove('fade-in'), 500);
            
            currentWordIndex++;
            setTimeout(showWord, 300);
        }

        // 完成学习
        function finishStudy() {
            alert(`本轮学习完成！\n共学习 ${studyQueue.length} 个单词\n前往统计页面查看详细进度`);
            backToCategories();
            showStats();
        }

        // 返回分类
        function backToCategories() {
            clearInterval(timerInterval);
            document.getElementById('studySection').style.display = 'none';
            document.getElementById('categorySection').style.display = 'block';
            renderCategories();
        }

        // 显示统计
        function showStats() {
            document.getElementById('categorySection').style.display = 'none';
            document.getElementById('studySection').style.display = 'none';
            document.getElementById('statsSection').style.display = 'block';
            
            // 计算总体统计
            let total = 0, mastered = 0, fuzzy = 0;
            const allWords = [];
            
            Object.keys(vocabularyData).forEach(key => {
                vocabularyData[key].words.forEach(word => {
                    total++;
                    const stat = wordStats[word.id];
                    const item = {
                        ...word,
                        category: vocabularyData[key].name,
                        status: stat ? stat.status : 'pending',
                        attempts: stat ? stat.attempts : 0
                    };
                    
                    if (stat) {
                        if (stat.status === 'mastered') mastered++;
                        else if (stat.status === 'fuzzy') fuzzy++;
                    }
                    
                    allWords.push(item);
                });
            });
            
            document.getElementById('totalWords').textContent = total;
            document.getElementById('masteredWords').textContent = mastered;
            document.getElementById('fuzzyWords').textContent = fuzzy;
            
            // 渲染单词列表
            const listContainer = document.getElementById('statsWordList');
            listContainer.innerHTML = '';
            
            // 按状态排序：模糊 > 未学习 > 已掌握
            allWords.sort((a, b) => {
                const order = { 'fuzzy': 0, 'pending': 1, 'mastered': 2 };
                return order[a.status] - order[b.status];
            });
            
            allWords.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-item';
                
                let statusClass = 'status-pending';
                let statusText = '未学习';
                if (word.status === 'mastered') {
                    statusClass = 'status-mastered';
                    statusText = '已掌握';
                } else if (word.status === 'fuzzy') {
                    statusClass = 'status-fuzzy';
                    statusText = '需复习';
                }
                
                div.innerHTML = `
                    <div class="word-info">
                        <div class="word-title">${word.star ? '★ ' : ''}${word.word}</div>
                        <div class="word-meta">${word.category} | 检测${word.attempts}次</div>
                    </div>
                    <div class="word-status ${statusClass}">${statusText}</div>
                `;
                listContainer.appendChild(div);
            });
        }

        // 返回首页
        function backToCategoriesFromStats() {
            document.getElementById('statsSection').style.display = 'none';
            document.getElementById('categorySection').style.display = 'block';
            renderCategories();
        }

        // 导出数据
        function exportData() {
            const dataStr = JSON.stringify(wordStats, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `vocabulary-stats-${new Date().toLocaleDateString()}.json`;
            link.click();
        }

        // 工具函数：打乱数组
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
